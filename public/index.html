<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Radar Web</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>AI Radar Web</h1>
      <p>One dashboard for AI updates, scoring, and daily digest.</p>
    </header>

    <main>
      <section class="card actions">
        <button id="btnIngest">Run Ingestion Now</button>
        <button id="btnSeed" class="secondary">Load Sample Data</button>
        <button id="btnDigest">Generate Daily Digest</button>
        <button id="btnRefresh">Refresh Dashboard</button>
      </section>

      <section class="card">
        <h2>Stats</h2>
        <div id="stats" class="grid"></div>
      </section>

      <section class="card">
        <h2>Settings</h2>
        <form id="settingsForm">
          <label for="providerSelect">Provider</label>
          <select id="providerSelect">
            <option value="openai">OpenAI</option>
            <option value="grok">Grok</option>
          </select>
          <div id="openaiFields">
            <input id="openaiKey" placeholder="OpenAI API Key" />
            <input id="openaiModel" placeholder="OpenAI Model (e.g. gpt-4o-mini)" />
          </div>
          <div id="grokFields">
            <input id="grokKey" placeholder="Grok API Key" />
            <input id="grokModel" placeholder="Grok Model (e.g. grok-beta)" />
          </div>
          <button type="submit">Save Settings</button>
        </form>
        <small>Only the selected provider is active and saved as current.</small>
      </section>

      <section class="card">
        <h2>Add Source</h2>
        <form id="sourceForm">
          <input id="sourceName" placeholder="Source name" required />
          <input id="sourceUrl" placeholder="RSS URL" required />
          <button type="submit">Add Source</button>
        </form>
      </section>

      <section class="card">
        <h2>Sources</h2>
        <div id="sources"></div>
      </section>

      <section class="card">
        <h2>Latest Items</h2>
        <div class="filters">
          <label for="categoryFilter">Category</label>
          <select id="categoryFilter"></select>
        </div>
        <div id="items"></div>
      </section>

      <section class="card">
        <h2>All Articles Summary</h2>
        <pre id="allSummary"></pre>
      </section>

      <section class="card">
        <h2>Latest Digest</h2>
        <pre id="digest"></pre>
      </section>

      <section class="card">
        <h2>Activity</h2>
        <div id="activityLog"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
  </html>
